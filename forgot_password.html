<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e9f5e9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 400px;
            margin: 100px auto;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        .form-container {
            display: flex;
            flex-direction: column;
        }

        form {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        form input {
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #4CAF50;
            border-radius: 4px;
        }

        form button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        form button:hover {
            background-color: #45a049;
        }

        p {
            text-align: center;
        }

        a {
            color: #4CAF50;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Money Mentor</h1>
        <div class="form-container">
            <!-- Forgot Password Form -->
            <form id="forgot-password-form">
                <h2>Reset Password</h2>
                <input type="text" id="reset-username" placeholder="Enter your username" required>
                <input type="date" id="reset-dob" placeholder="Enter your Date of Birth" required>
                <button type="submit">Verify</button>
                <p><a href="login.html" id="back-to-login">Back to Login</a></p>
            </form>

            <!-- New Password Form -->
            <form id="new-password-form" style="display: none;">
                <h2>Set New Password</h2>
                <!-- Enter New Password -->
                <div>
                    <input type="password" id="new-password" placeholder="Enter New Password" required>
                </div>
                <!-- Re-enter New Password -->
                <div>
                    <input type="password" id="confirm-password" placeholder="Re-enter New Password" required>
                </div>
                <!-- Reset Button -->
                <div>
                    <button type="submit">Reset Password</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const forgotPasswordForm = document.getElementById("forgot-password-form");
            const newPasswordForm = document.getElementById("new-password-form");
            const resetUsernameInput = document.getElementById("reset-username");
            const resetDobInput = document.getElementById("reset-dob");
            const newPasswordInput = document.getElementById("new-password");
            const confirmPasswordInput = document.getElementById("confirm-password");

            let usernameForReset = null;

            // Handle forgot password form submission
            forgotPasswordForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const username = resetUsernameInput.value;
                const dob = resetDobInput.value;

                fetch('/forgot_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username: username, dob: dob })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        alert(data.message); // Notify user they can now reset their password
                        usernameForReset = username;
                        forgotPasswordForm.style.display = "none";
                        newPasswordForm.style.display = "block";
                    } else {
                        alert(data.error || "An error occurred.");
                    }
                })
                .catch(error => {
                    alert("An error occurred during password reset.");
                });
            });

            // Handle new password form submission
            newPasswordForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                // Ensure passwords match
                if (newPassword !== confirmPassword) {
                    alert("Passwords do not match!");
                    return;
                }

                // Send the new password to the backend
                fetch('/reset_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username: usernameForReset, new_password: newPassword })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        alert(data.message); // Notify user the password has been reset
                        window.location.href = "login.html";  // Redirect to login page
                    } else {
                        alert(data.error || "An error occurred.");
                    }
                })
                .catch(error => {
                    alert("An error occurred while resetting the password.");
                });
            });
        });
    </script>
</body>

</html>
