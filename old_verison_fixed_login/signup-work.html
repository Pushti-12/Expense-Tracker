<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Mentor - Login/Signup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e9f5e9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 400px;
            margin: 100px auto;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        .form-container {
            display: flex;
            flex-direction: column;
        }

        form {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        form input {
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #4CAF50;
            border-radius: 4px;
        }

        form button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        form button:hover {
            background-color: #45a049;
        }

        p {
            text-align: center;
        }

        a {
            color: #4CAF50;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Money Mentor</h1>
        <div class="form-container">
            <!-- Login Form -->
            <form id="login-form">
                <h2>Login</h2>
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p>Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
            </form>

            <!-- Sign Up Form -->
            <form id="signup-form" style="display: none;">
                <h2>Sign Up</h2>
                <div class="form-group">
                    <input type="text" id="new-username" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" id="new-password" placeholder="Password" required>
                </div>
                <div class="form-group">
                    <input type="password" id="reenter-password" placeholder="Re-enter Password" required>
                </div>
                <div class="form-group">
                    <input type="date" id="birthdate" placeholder="Birthdate" required>
                </div>
                <button type="submit">Sign Up</button>
                <p>Already have an account? <a href="#" id="show-login">Login</a></p>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById("login-form");
            const signupForm = document.getElementById("signup-form");
            const showSignup = document.getElementById("show-signup");
            const showLogin = document.getElementById("show-login");

            // Show the signup form when the "Sign up" link is clicked
            showSignup.addEventListener("click", (e) => {
                e.preventDefault();
                loginForm.style.display = "none";
                signupForm.style.display = "block";
            });

            // Show the login form when the "Login" link is clicked
            showLogin.addEventListener("click", (e) => {
                e.preventDefault();
                signupForm.style.display = "none";
                loginForm.style.display = "block";
            });

            // Handle login form submission
            loginForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const username = document.getElementById("username").value;
                const password = document.getElementById("password").value;

                // Prepare data for login request
                const loginData = {
                    username: username,
                    password: password
                };

                // Send login data to backend
                fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        // Redirect to dashboard after successful login
                        window.location.href = "dashboard.html";  // Adjust the redirect page here
                    } else {
                        alert(data.error); // Show error from backend
                    }
                })
                .catch(error => {
                    alert("An error occurred during login. Please try again.");
                });
            });

            // Handle signup form submission
            signupForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const newUsername = document.getElementById("new-username").value;
                const newPassword = document.getElementById("new-password").value;
                const reenterPassword = document.getElementById("reenter-password").value;
                const birthdate = document.getElementById("birthdate").value;

                // Password matching validation
                if (newPassword !== reenterPassword) {
                    alert("Passwords do not match. Please try again.");
                    return;
                }

                // Prepare data for backend
                const signupData = {
                    username: newUsername,
                    password: newPassword,
                    birthdate: birthdate
                };

                // Send data to the backend
                fetch('http://localhost:5000/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(signupData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        alert(data.message);
                        window.location.href = "signup.html"; // Redirect to signup success page
                    } else {
                        alert(data.error); // Show error from backend
                    }
                })
                .catch(error => {
                    alert("An error occurred while signing up. Please try again.");
                });
            });
        });
    </script>
</body>

</html>
