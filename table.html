<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker with Charts</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Your existing styles remain unchanged */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: row;
            height: 100vh;
        }

        .input-container {
            width: 50%;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            background-color: #f9f9f9;
        }

        .chart-container {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background-color: #f8f9fa;
            padding: 20px;
            box-sizing: border-box;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        form input,
        form select,
        form button {
            padding: 10px;
            border: 1px solid #a5d6a7;
            border-radius: 4px;
            box-sizing: border-box;
        }

        form input,
        form select {
            flex-grow: 1;
        }

        form button {
            padding: 8px 12px;
            border: 1px solid #4caf50;
            border-radius: 4px;
            background-color: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
            width: auto;
            max-width: 150px;
            flex-shrink: 0;
        }

        form button:hover {
            background-color: #388e3c;
        }

        .expense-table table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .expense-table th,
        .expense-table td {
            padding: 10px;
            border: 1px solid #c8e6c9;
            text-align: left;
        }

        .expense-table th {
            background-color: #a5d6a7;
            color: #1b5e20;
        }

        .total-amount {
            text-align: right;
            font-size: 18px;
            color: #2e7d32;
        }

        canvas {
            max-width: 100%;
            max-height: 45%;
        }
    </style>
</head>

<body>
    <!-- Expense Input and Table -->
    <div class="input-container">
        <h1>Expense Tracker</h1>
        <form id="expense-form">
            <input type="text" id="expense-name" placeholder="Expense Name" required />
            <input type="number" id="expense-amount" placeholder="Amount" required />
            <select id="expense-category" required>
                <option value="" disabled selected>Select Category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select>
            <input type="date" id="expense-date" required />
            <button type="submit">Add Expense</button>
        </form>

        <div class="expense-table">
            <table>
                <thead>
                    <tr>
                        <th>Expense Name</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expense-list"></tbody>
            </table>
            <div class="total-amount">
                <strong>Total:</strong> ₹<span id="total-amount">0</span>
            </div>
        </div>
    </div>

    <!-- Pie Chart and Graph -->
    <div class="chart-container">
        <canvas id="pieChart"></canvas>
        <canvas id="lineGraph"></canvas>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const expenseForm = document.getElementById("expense-form");
            const expenseList = document.getElementById("expense-list");
            const totalAmount = document.getElementById("total-amount");

            // Fetch expenses on page load
            fetchExpenses();

            // Add Expense functionality
            expenseForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                const name = document.getElementById("expense-name").value;
                const amount = parseFloat(document.getElementById("expense-amount").value);
                const category = document.getElementById("expense-category").value;
                const date = document.getElementById("expense-date").value;

                const expense = { name, amount, category, date };

                await fetch("http://127.0.0.1:5000/add_expense", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(expense),
                });

                fetchExpenses();
                expenseForm.reset();
            });

            async function fetchExpenses() {
                const response = await fetch("http://127.0.0.1:5000/get_expenses");
                const expenses = await response.json();
                updateUI(expenses);
            }

            async function deleteExpense(id) {
                await fetch(`http://127.0.0.1:5000/delete_expense/${id}`, { method: "DELETE" });
                fetchExpenses();
            }

            function updateUI(expenses) {
                // Update Expense Table
                expenseList.innerHTML = "";
                let total = 0;

                expenses.forEach(expense => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${expense.name}</td>
                        <td>₹${expense.amount.toLocaleString()}</td>
                        <td>${expense.category}</td>
                        <td>${expense.date}</td>
                        <td><button class="delete-btn" data-id="${expense.id}">Delete</button></td>`;
                    expenseList.appendChild(row);
                    total += expense.amount;
                });

                // Attach delete event listeners to the delete buttons
                document.querySelectorAll(".delete-btn").forEach(button => {
                    button.addEventListener("click", (e) => {
                        const id = e.target.getAttribute("data-id");
                        deleteExpense(id);
                    });
                });

                // Update Total Amount
                totalAmount.textContent = total.toLocaleString();

                // Update Charts
                updatePieChart(expenses);
                updateLineGraph(expenses);
            }

            function updatePieChart(expenses) {
                const categorySums = expenses.reduce((acc, exp) => {
                    acc[exp.category] = (acc[exp.category] || 0) + exp.amount;
                    return acc;
                }, {});

                const pieChart = new Chart(document.getElementById("pieChart").getContext("2d"), {
                    type: "pie",
                    data: {
                        labels: Object.keys(categorySums),
                        datasets: [{
                            data: Object.values(categorySums),
                            backgroundColor: ["#f94144", "#f3722c", "#f8961e", "#43aa8b"],
                        }],
                    },
                    options: { responsive: true },
                });
            }

            function updateLineGraph(expenses) {
                const sortedExpenses = [...expenses].sort((a, b) => new Date(a.date) - new Date(b.date));
                const graphData = {
                    dates: sortedExpenses.map(exp => exp.date),
                    amounts: sortedExpenses.map(exp => exp.amount),
                };

                const lineGraph = new Chart(document.getElementById("lineGraph").getContext("2d"), {
                    type: "line",
                    data: {
                        labels: graphData.dates,
                        datasets: [{
                            label: "Expenses Over Time",
                            data: graphData.amounts,
                            borderColor: "#43aa8b",
                            fill: false,
                        }],
                    },
                    options: { responsive: true },
                });
            }
        });
    </script>
</body>

</html>
