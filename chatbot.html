<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1
  <title>Chatbot</title>
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    /* Body Styling */
    body {
      height: 100vh;
      background-color: #f4f4f9;
      position: relative;
    }

    /* Chatbot Container */
    .chatbot-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 300px;
      background-color: #ffffff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      display: flex; /* Changed to always display */
      flex-direction: column;
      z-index: 1000;
    }

    /* Header */
    .chatbot-header {
      background-color: #4CAF50;
      color: white;
      padding: 1rem;
      text-align: center;
      font-size: 1rem;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      cursor: pointer;
    }

    /* Messages Area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background-color: #f9f9f9;
    }

    .messages p {
      margin: 0.5rem 0;
      padding: 10px;
      border-radius: 5px;
      max-width: 70%;
    }

    .user-message {
      margin-left: auto;
      background-color: #d1ffd1;
      text-align: right;
    }

    .bot-message {
      background-color: #e0f7fa;
      text-align: left;
    }

    /* Input Area */
    .chat-input {
      padding: 1rem;
      gap: 10px;
      background-color: #ffffff;
      border-top: 1px solid #ddd;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      display: flex;
    }

    .chat-input input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .chat-input button {
      padding: 0.5rem 1rem;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div class="chatbot-container" id="chatbot">
    <div class="chatbot-header" id="chatbot-header">Chatbot</div>
    <div class="messages" id="messages">
      <p class="bot-message">Hello! How can I help you?</p>
    </div>
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type your message here">
      <button id="send-button">Send</button>
    </div>
  </div>

  <script>
    // Predefined Bot Responses
    const responses = {
      "hello": "Hi! How can I assist you today?",
      "hi": "Hello! How can I help you?",
      "what": "This app helps you track and manage your money efficiently.",
      "how": "You can interact with me for assistance and get financial insights.",
      "bye": "Goodbye! Have a great day!",
      "default": "I'm not sure how to respond. Could you rephrase that?"
    };

    // Event Listeners
    document.getElementById("send-button").addEventListener("click", sendMessage);
    document.getElementById("user-input").addEventListener("keypress", function (e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // Send Message Function
    function sendMessage() {
      const userInput = document.getElementById("user-input");
      const message = userInput.value.trim();

      if (message) {
        addMessage(message, "user-message");
        const response = getBotResponse(message.toLowerCase());
        addMessage(response, "bot-message");
        userInput.value = "";
      }
    }

    // Add Message to Chat
    function addMessage(message, className) {
      const newMessage = document.createElement("p");
      newMessage.className = className;
      newMessage.textContent = message;
      messagesDiv.appendChild(newMessage);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Get Bot Response
    function getBotResponse(input) {
      for (let key in responses) {
        if (input.includes(key)) {
          return responses[key];
        }
      }
      return responses["default"];
    }
  </script>
</body>

</html>
