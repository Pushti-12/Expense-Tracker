<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard with Search Bar</title>
  <!-- Font Awesome CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-x: hidden;
      background-image: url("bg_2.jpeg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .navbar {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      box-sizing: border-box;
    }

    .logo {
      height: 80px;
      width: auto;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: auto;
      padding-bottom: 30px;
    }

    .button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 20px 40px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      width: 200px;
      text-align: center;
    }

    .button:hover {
      background-color: #45a049;
    }

    .chatbot-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 300px;
      background-color: #ffffff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      display: none;
      flex-direction: column;
      z-index: 1000;
    }

    .chatbot-header {
      background-color: #4CAF50;
      color: white;
      padding: 1rem;
      text-align: center;
      font-size: 1rem;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      cursor: pointer;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background-color: #f9f9f9;
    }

    .messages p {
      margin: 0.5rem 0;
      padding: 10px;
      border-radius: 5px;
      max-width: 70%;
    }

    .user-message {
      margin-left: auto;
      background-color: #d1ffd1;
      text-align: right;
    }

    .bot-message {
      background-color: #e0f7fa;
      text-align: left;
    }

    .chat-input {
      padding: 1rem;
      gap: 10px;
      background-color: #ffffff;
      border-top: 1px solid #ddd;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      display: flex;
    }

    .chat-input input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .chat-input button {
      padding: 0.5rem 1rem;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <img src="logo.png" alt="Logo" class="logo">
  </div>

  <h2>Welcome to Money Mentor!</h2>
  <p>This is your personalized dashboard.</p>

  <div class="button-container">
    <button class="button" onclick="window.location.href='table.html'">Track Expenses</button>
    <button class="button" onclick="window.location.href='blogs.html'">Blogs</button>
    <button class="button" onclick="toggleChatbot()">Chatbot</button>
    <button class="button" onclick="window.location.href='faq.html'">FAQ</button>
  </div>

  <div class="chatbot-container" id="chatbot">
    <div class="chatbot-header" id="chatbot-header">Chatbot</div>
    <div class="messages" id="messages">
      <p class="bot-message">Hello! How can I help you?</p>
    </div>
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type your message here">
      <button id="send-button">Send</button>
    </div>
  </div>

  <script>
    function toggleChatbot() {
      const chatbotContainer = document.getElementById("chatbot");
      chatbotContainer.style.display =
        chatbotContainer.style.display === "flex" ? "none" : "flex";
    }

    const responses = {
      "hello": "Hi! How can I assist you today?",
      "hi": "Hello! How can I help you?",
      "what": "This app helps you track and manage your money efficiently.",
      "how": "You can interact with me for assistance and get financial insights.",
      "bye": "Goodbye! Have a great day!",
      "default": "I'm not sure how to respond. Could you rephrase that?"
    };

    document.getElementById("send-button").addEventListener("click", () => {
      const userInput = document.getElementById("user-input").value.toLowerCase();
      const messagesContainer = document.getElementById("messages");

      if (userInput.trim() !== "") {
        const userMessage = document.createElement("p");
        userMessage.className = "user-message";
        userMessage.textContent = userInput;
        messagesContainer.appendChild(userMessage);

        const botMessage = document.createElement("p");
        botMessage.className = "bot-message";
        botMessage.textContent = responses[userInput] || responses["default"];
        messagesContainer.appendChild(botMessage);

        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        document.getElementById("user-input").value = "";
      }
    });
  </script>
</body>

</html>
